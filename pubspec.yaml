name: random_movie
description: "片刻 - 记录每一次观影，决定今晚看什么"
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  provider: ^6.1.1

  # 路由
  go_router: ^13.0.0

  # 网络请求
  dio: ^5.4.0
  crypto: ^3.0.7

  # 本地存储
  shared_preferences: ^2.2.2
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # UI组件
  flutter_animate: ^4.3.0
  cached_network_image: ^3.3.1

  # HTML解析（片单爬取）
  html: ^0.15.4

  # 工具
  uuid: ^4.2.2
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  intl: ^0.19.0
  file_picker: ^8.1.2
  path_provider: ^2.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "lib/icon/icon.webp"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "lib/icon/icon.webp"

flutter:
  uses-material-design: true
